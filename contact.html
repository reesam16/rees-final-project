<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Rees</title>
    <link rel="stylesheet" href="style.css">
    <!-- <link rel="stylesheet" href="form.css"> -->
</head>

<body>
    <main class="form-outer-container">
        <div class="form-container">
            <h2 class="form-title">Contact Me</h2>
            <form action="" id="contact-form" novalidate>
                
                    <div class="form-group">
                        <label for="name" class="form-label">Your Name</label>
                        <input type="text" id="name" name="name" class="form-input" placeholder="Name" required>
                    </div>
                    <div class="form-group">
                        <label for="email" class="form-label">Your Email</label>
                        <input type="email" id="email" name="email" class="form-input" placeholder="email@mail.com"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="subject" class="form-label">Subject</label>
                        <input type="text" id="subject" name="subject" class="form-input" placeholder="Inquiry about..."
                            required>
                    </div>
                    <div class="form-group-last">
                        <label for="message" class="form-label">Your Message</label>
                        <textarea name="message" id="message" cols="30" rows="10" class="form-input"
                            placeholder="Your message here..." required></textarea>
                    </div>
                    <div class="button-container">
                        <button type="submit" class="submit-button">Send Message</button>
                        <button type="button" id="clear-btn" class="clear-button hidden">Clear Messages</button>
                    </div>
                    
                    <div id="statusMessage" class="message-box"></div>
                    <section id="feed-container">
                        <h3>Recent Submissions</h3>
                        <div id="submission-list">
                            <p>No messages yet.</p>
                        </div>
                    </section>
            </form>    
        </div>
        
    </main>
    <script src="contact.js"></script>
</body>

</html>
