<body>
    <header>
        <nav class="navbar">
            <a href="../index.html" class="icon">
                <img src="../assets-rw/logo.svg" class="nav-logo" alt="my logo">
            </a>
            <ul class="nav-menu">

                    <a href="../index.html" class="link">home</a>
                </li>

                    <a href="../index.html#work" class="link">paintings</a>

            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>

        </nav>
        

    </header>

    <main class="container">
        <section id="guestbook-input">
            <h2>Sign the Guestbook</h2>
            <p>Leave a note about the artwork!</p>
            
            <form id="contact-form" novalidate> 
                <div class="input-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" placeholder="Name" required>
                </div>
    
                <div class="input-group">
                    <label for="message">Your Comment</label>
                    <textarea id="message" placeholder="Pleas write commentent here." required></textarea>
                </div>
    
                <input type="hidden" id="subject" value="Guestbook Entry">
    
                <div class="button-container">
                    <button type="submit" class="btn-primary">Post Comment</button>
                    <button type="button" id="clear-btn" class="btn-danger hidden">Wipe All Records</button>
                </div>
                
                <div id="statusMessage"></div>
            </form>
        </section>
    
        <hr>
    
        <section id="guestbook-feed">
            <h3>Public Notes</h3>
            <div id="submission-list">
                </div>
        </section>
    </main>
